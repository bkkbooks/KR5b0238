body:
  text: 人各恭敬至心朝禮下元水官尊神至心朝禮真皇洞神天尊至心朝禮積功成聖天尊至心朝禮凝神照境天尊至心朝禮和神利物天尊至心朝禮總監衆靈天尊至心朝禮幽照無極天尊至心朝禮好解羅網天尊至心朝禮朱景洞照天尊至心朝禮萬行圓滿天尊至心朝禮大乘空慧天尊至心朝禮還功報德天尊至心朝禮隱跡全道天尊至心朝禮法體緣成天尊至心朝禮紫霞浮蓋天尊至心朝禮法雲流潤天尊至心朝禮蕆揚妙化天尊至心朝禮玄智逺照天尊至心朝禮尊妙無雙天尊至心朝禮行圓虛界天尊至心朝禮玉京垂慧天尊至心朝禮保度應運天尊至心朝禮太微光範天尊至心朝禮真相具足天尊至心朝禮導世無為天尊至心朝禮法緣常濟天尊至心朝禮永證道源天尊至心朝禮常轉真戒天尊至心朝禮沖和淨樂天尊至心朝禮玄隱無為天尊至心朝禮幽源不測天尊至心朝禮默念無為天尊至心朝禮留教廣度天尊至心朝禮救度八難天尊至心朝禮飛升金闕天尊至心朝禮遊宴玉京天尊至心朝禮遊行太空天尊至心朝禮離合自然天尊至心朝禮本在空洞天尊至心朝禮遍體虛空天尊至心朝禮攝跡歸本天尊至心朝禮十回度人天尊至心朝禮營衛神文天尊至心朝禮隨機開悟天尊至心朝禮斷除邪障天尊至心朝禮聖概無窮天尊至心朝禮開化玄宗天尊至心朝禮百寶聖嚴天尊至心朝禮廣布神化天尊至心朝禮妙力廣王天尊至心朝禮總朝上帝天尊至心朝禮功能上善天尊至心朝禮雲華見相天尊至心朝禮凝寂金闕天尊至心朝禮杳冥神化天尊至心朝禮住七寶林天尊至心朝禮通幽至理天尊至心朝禮精勤進業天尊至心朝禮真珠海潤天尊至心朝禮逺離强名天尊至心朝禮隨意㑹樂天尊至心朝禮玉光流潤天尊至心朝禮靈變光明天尊至心朝禮最上妙行天尊至心朝禮清淨智海天尊至心朝禮德大無量天尊至心朝禮凝安智慧天尊至心朝禮功業無過天尊至心朝禮寶羽瓊林天尊至心朝禮周應無極天尊至心朝禮廣大圓滿天尊至心朝禮哀悲衆苦天尊至心朝禮愍空法藏天尊至心朝禮愍一切類天尊至心朝禮流傳寶經天尊至心朝禮無礙慧王天尊至心朝禮玉清金相天尊至心朝禮無滯著相天尊至心朝禮寂妙上成天尊至心朝禮洞明世界天尊至心朝禮好生度命天尊至心朝禮無方化度天尊至心朝禮龍德變化天尊至心朝禮常慈愛憐天尊至心朝禮救度萬品天尊至心朝禮應變無量天尊至心朝禮弘慈大量天尊至心朝禮周行救苦天尊至心朝禮梵化修功天尊至心朝禮洞鑑無礙天尊至心朝禮赴難垂恩天尊至心朝禮日月光曜天尊至心朝禮六通四達天尊至心朝禮萬願剋成天尊至心朝禮應生轉世天尊至心朝禮演法垂文天尊至心朝禮凝常歡樂天尊至心朝禮普垂妙澤天尊至心朝禮體道安靜天尊至心朝禮無量道眼天尊至心朝禮常施法潤天尊至心朝禮逍遙十善天尊至心朝禮化度無量天尊至心朝禮萬川還源天尊至心朝禮演法度人天尊至心朝禮龍興應變天尊至心朝禮超越三界天尊至心朝禮大施利濟天尊至心朝禮清微至德天尊至心朝禮常住護世天尊至心朝禮轉滅障難天尊至心朝禮紫極元皇天尊至心朝禮圓通自在天尊至心朝禮善誘愚迷天尊至心朝禮五劫輪轉天尊至心朝禮講道靜真天尊至心朝禮宛味希夷天尊至心朝禮永出生死天尊至心朝禮法澤流布天尊至心朝禮洞照冥空天尊至心朝禮水府河海一切聖衆即日至心歸神歸身歸命太上無極大道下元一百二十應感天尊無極聖衆重念某自從無始以來至于今日恐積所犯殺害賢良元逆醜惡非人所行淫色盜竊敗人成功離人骨肉奪人所崇為子不孝為臣不忠悖逆君主攻伐師宗上不敬天地下不敬鬼神訾毀大道褻慢靈文口是心非揚巳嫉能輕慢四大觸穢三光惡口兩舌讒擊善人種種罪咎無量無邊躬對道前盡誠懴悔伏願下元衆聖察命童子善惡功曹十直神仙録其罪目攺作齊功上奏天曹當令某所懴罪愆隨念消除悉皆解脫九玄七祖遽至上生一切有情同登道岸至心稽首禮無上虛皇正真三寶太上靈寶下元水官消愆滅罪懴下
