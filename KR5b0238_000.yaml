front:
  text: 太上靈寶下元水官消愆滅罪懴下爾時元始天尊於金靈洞隂之館演說法教時有真人號曰明羅越班前進上白元始天尊臣宿緣流慶獲侍尊顔然大小九六之災未蒙闡教敢賴宣諭天尊告曰四時遷謝隂陽律吕運動皆委於天地水三官至於四海三河溪澗川源池塘湖堰渚穴流泉水類魚龍黿鼉龜鱉等濕居之類并年歲豐歉人民休咎悉付下元水官校定吾昔於上皇元年與五老上帝隂陽二宫上真五星七元二十八宿九州社令於三天境內配定分野分别善惡八卦九宫皆有泉流今觀此世界福瑞希降民多流亡分野水旱兵戈交戰五榖不熟皆是凡愚積惡所及天尊於是放大威光普照十方國土乃召諸天神仙聖衆山川潭洞靈祇四海龍王雲奔雨驟雷電震響雨澤雱𩃱穌此一國窮民悉離憂苦是時道俗男女莫不欣喜仰荷洪恩遜謝不逮讃歎無窮天尊復謂下元水官水府真人一切衆生生死因緣無有間歇父母懷耽乳哺養育漸至長成乃能分别即滯愛欲罪根深重報對罪福念念成非塵劫結習久在身中從劫至劫不能出離不值聖賢難可解脫久染六情恩愛三毒貪嗔愚癡嫉妬賢能一切罪犯並願消除須至投誠懇切歸命大道下元一百二十天尊洗雪身中一切罪業若不得師為其演說經典無由曉悟若今日師尊示我經法度脫罪犯出離沈滯由師之恩入於正道普勸衆生早回覺悟
